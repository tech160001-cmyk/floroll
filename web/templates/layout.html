    <title>{{.Title}} — FloRoll</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo">FloRoll 🌸</a>
